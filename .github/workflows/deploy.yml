name: Deploy Portfolio

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies & Build Quartz
        working-directory: ./garden
        run: |
          npm ci
          npx quartz build

      - name: Prepare Final Website Artifact
        run: |
          mkdir deploy_artifact
          rsync -a --exclude 'garden' --exclude 'deploy_artifact' --exclude '.git' --exclude '.github' ./ deploy_artifact/
          mkdir -p deploy_artifact/garden/public
          cp -r garden/public/* deploy_artifact/garden/public/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy_artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
